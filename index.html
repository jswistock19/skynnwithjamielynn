<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Skynn With Jamie Lynn</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf8f5;
      color: #2c2c2c;
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #b89a7e;
      margin-bottom: 3rem;
    }

    .smiley {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem;
      font-weight: 300;
      line-height: 1;
      color: #c9a882;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .message {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .sub {
      font-size: 0.85rem;
      color: #aaa;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c9a882;
      margin: 2rem auto;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="logo">Skynn With Jamie Lynn</div>

  <!-- Animated smiley face -->
  <svg class="smiley" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="56" stroke="#c9a882" stroke-width="3" fill="#fdf6ee"/>
    <!-- Eyes -->
    <circle cx="42" cy="50" r="5" fill="#c9a882"/>
    <circle cx="78" cy="50" r="5" fill="#c9a882"/>
    <!-- Smile -->
    <path d="M38 72 Q60 92 82 72" stroke="#c9a882" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Cheeks -->
    <circle cx="30" cy="68" r="8" fill="#e8c9a8" opacity="0.4"/>
    <circle cx="90" cy="68" r="8" fill="#e8c9a8" opacity="0.4"/>
  </svg>

  <div class="code">404</div>
  <div class="divider"></div>
  <p class="message">This page is currently unavailable</p>
  <p class="sub">Please check back soon &mdash; we&rsquo;ll be glowing again shortly.</p>
</body>
</html>
